<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Create your GymPro account — Join the premium fitness platform.">
  <title>Register — GymPro</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/auth.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏋️</text></svg>">
</head>
<body>

  <div class="toast-container" id="toastContainer"></div>

  <div class="auth-page">
    <div class="auth-card">
      <a href="index.html" class="auth-card__logo">
        <span class="auth-card__logo-icon">🏋️</span>
        GymPro
      </a>
      <h1 class="auth-card__title">Create Account</h1>
      <p class="auth-card__subtitle">Join GymPro and start your fitness journey</p>

      <form id="registerForm" autocomplete="on">
        <div class="form-group">
          <label for="regName">👤 Full Name</label>
          <input type="text" class="form-input" id="regName" placeholder="John Doe" required autocomplete="name">
        </div>

        <div class="auth-card__row">
          <div class="form-group">
            <label for="regEmail">📧 Email</label>
            <input type="email" class="form-input" id="regEmail" placeholder="you@example.com" required autocomplete="email">
          </div>
          <div class="form-group">
            <label for="regPhone">📱 Phone (optional)</label>
            <input type="tel" class="form-input" id="regPhone" placeholder="+1234567890" autocomplete="tel">
          </div>
        </div>

        <div class="form-group">
          <label for="regPassword">🔒 Password</label>
          <input type="password" class="form-input" id="regPassword" placeholder="Min 6 characters" required autocomplete="new-password">
          <div class="password-strength">
            <div class="password-strength__bar"></div>
          </div>
        </div>

        <div class="form-group">
          <label for="regConfirmPassword">🔒 Confirm Password</label>
          <input type="password" class="form-input" id="regConfirmPassword" placeholder="Re-enter password" required autocomplete="new-password">
        </div>

        <button type="submit" class="btn btn--primary btn--full btn--lg">Create Account</button>
      </form>

      <div id="userIdDisplay" style="display:none" class="user-id-display">
        <div class="user-id-display__label">Your Member ID</div>
        <div class="user-id-display__value">—</div>
      </div>

      <div class="auth-card__footer">
        Already have an account? <a href="login.html">Login →</a>
      </div>
    </div>
  </div>

  <script src="js/app.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
