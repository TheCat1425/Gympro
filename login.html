<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Login to GymPro — Access your fitness dashboard, bookings, and marketplace.">
  <title>Login — GymPro</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/auth.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏋️</text></svg>">
</head>
<body>

  <div class="toast-container" id="toastContainer"></div>

  <div class="auth-page">
    <div class="auth-card">
      <a href="index.html" class="auth-card__logo">
        <span class="auth-card__logo-icon">🏋️</span>
        GymPro
      </a>
      <h1 class="auth-card__title">Welcome Back</h1>
      <p class="auth-card__subtitle">Login to access your fitness dashboard</p>

      <form id="loginForm" autocomplete="on">
        <div class="form-group">
          <label for="loginEmail">📧 Email Address</label>
          <input type="email" class="form-input" id="loginEmail" placeholder="you@example.com" required autocomplete="email">
        </div>

        <div class="form-group">
          <label for="loginPassword">🔒 Password</label>
          <input type="password" class="form-input" id="loginPassword" placeholder="Enter your password" required autocomplete="current-password">
        </div>

        <button type="submit" class="btn btn--primary btn--full btn--lg">Login</button>
      </form>

      <div class="auth-card__divider">or</div>

      <div class="auth-card__footer">
        Don't have an account? <a href="register.html">Create one →</a>
      </div>

      <div style="margin-top:24px; padding:16px; background:var(--glass-bg); border:1px solid var(--glass-border); border-radius:var(--radius-md); font-size:0.82rem; color:var(--text-muted)">
        <strong style="color:var(--accent)">Demo accounts:</strong><br>
        Admin: <code style="color:var(--primary-light)">admin@gympro.com</code> / <code>admin123</code><br>
        Member: <code style="color:var(--primary-light)">john@gympro.com</code> / <code>member123</code>
      </div>
    </div>
  </div>

  <script src="js/app.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
